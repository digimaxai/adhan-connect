<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adhan Connect Expo Go QR Codes</title>
  <style>
    :root { color-scheme: light; font-family: Arial, Helvetica, sans-serif; background: #f7f7f4; color: #17201b; }
    body { margin: 0; padding: 32px; }
    main { max-width: 980px; margin: 0 auto; }
    h1 { font-size: 28px; margin: 0 0 8px; }
    p { margin: 0 0 24px; color: #4b5563; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; align-items: start; }
    .qr { background: #fff; border: 1px solid #deded8; border-radius: 8px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .qr img { width: 100%; height: auto; display: block; }
    code { font-size: 15px; background: #eceee8; border-radius: 6px; padding: 3px 6px; }
  </style>
</head>
<body>
  <main>
    <h1>Adhan Connect Expo Go</h1>
    <p>Scan on the same Wi-Fi network. URL: <code>exp://192.168.1.139:8081</code></p>
    <section class="grid">
      <div class="qr"><img src="expo-go-iphone.svg" alt="iPhone Expo Go QR code" /></div>
      <div class="qr"><img src="expo-go-android.svg" alt="Android Expo Go QR code" /></div>
    </section>
  </main>
</body>
</html>
